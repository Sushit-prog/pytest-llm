<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Reliability Platform{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; line-height: 1.6; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: #161b22; border-right: 1px solid #30363d; padding: 20px 0; z-index: 100; }
        .sidebar h1 { font-size: 16px; padding: 0 20px 20px; color: #58a6ff; border-bottom: 1px solid #30363d; margin-bottom: 10px; }
        .sidebar a { display: block; padding: 10px 20px; color: #8b949e; text-decoration: none; font-size: 14px; transition: all 0.2s; }
        .sidebar a:hover, .sidebar a.active { color: #e1e4e8; background: #21262d; }
        .sidebar .section { font-size: 11px; text-transform: uppercase; color: #484f58; padding: 20px 20px 5px; letter-spacing: 1px; }
        .main { margin-left: 240px; padding: 30px 40px; }
        .page-header { margin-bottom: 30px; }
        .page-header h2 { font-size: 24px; color: #e1e4e8; }
        .page-header p { color: #8b949e; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 28px; font-weight: 700; color: #e1e4e8; margin-top: 4px; }
        .card .value.green { color: #3fb950; }
        .card .value.red { color: #f85149; }
        .card .value.blue { color: #58a6ff; }
        table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
        th { background: #21262d; padding: 12px 16px; text-align: left; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 12px 16px; border-top: 1px solid #30363d; font-size: 14px; }
        tr:hover { background: #21262d; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge.pass { background: #1a3a2a; color: #3fb950; }
        .badge.fail { background: #3a1a1a; color: #f85149; }
        .badge.error { background: #3a2a1a; color: #d29922; }
        .badge.running { background: #1a2a3a; color: #58a6ff; }
        .badge.success { background: #1a3a2a; color: #3fb950; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; }
        .btn-primary { background: #238636; color: white; }
        .btn-primary:hover { background: #2ea043; text-decoration: none; }
        .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
        .btn-secondary:hover { background: #30363d; text-decoration: none; }
        .empty { text-align: center; padding: 60px 20px; color: #484f58; }
        .trace-timeline { position: relative; padding-left: 20px; }
        .trace-timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: #30363d; }
        .span-item { position: relative; margin-bottom: 16px; padding: 12px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; }
        .span-item::before { content: ''; position: absolute; left: -16px; top: 16px; width: 10px; height: 10px; border-radius: 50%; background: #3fb950; border: 2px solid #0f1117; }
        .span-item.error::before { background: #f85149; }
        .span-item .span-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .span-item .span-name { font-weight: 600; font-size: 14px; }
        .span-item .span-meta { font-size: 12px; color: #8b949e; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h1>AI Reliability</h1>
        <div class="section">Overview</div>
        <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
        <div class="section">Evaluation</div>
        <a href="/eval/datasets" class="{% if '/eval/datasets' in request.url.path %}active{% endif %}">Datasets</a>
        <a href="/eval/runs" class="{% if '/eval/runs' in request.url.path %}active{% endif %}">Eval Runs</a>
        <a href="/eval/runs/compare" class="{% if '/eval/runs/compare' in request.url.path %}active{% endif %}">Compare Runs</a>
        <div class="section">Analytics</div>
        <a href="/providers" class="{% if '/providers' in request.url.path %}active{% endif %}">Providers</a>
        <a href="/failures" class="{% if '/failures' in request.url.path %}active{% endif %}">Failures</a>
        <div class="section">Traces</div>
        <a href="/traces" class="{% if request.url.path == '/traces' %}active{% endif %}">All Traces</a>
        <div class="section">API</div>
        <a href="/docs" target="_blank">API Docs</a>
    </nav>
    <div class="main">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
