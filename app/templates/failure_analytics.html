{% extends "base.html" %}
{% block title %}Failure Analytics — AI Reliability Platform{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Failure Analytics</h2>
    <p>Breakdown of failure types across all eval runs</p>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
    <div class="card">
        <div class="label" style="margin-bottom: 12px;">Failure Distribution</div>
        <canvas id="failureChart" height="250"></canvas>
    </div>
    <div class="card">
        <div class="label" style="margin-bottom: 12px;">Failure Summary</div>
        <div id="failure-summary"></div>
    </div>
</div>

<div class="card">
    <div class="label" style="margin-bottom: 12px;">All Failures</div>
    <table>
        <thead>
            <tr><th>Failure Type</th><th>Count</th><th>Percentage</th></tr>
        </thead>
        <tbody id="failure-table"></tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
async function loadFailures() {
    const resp = await fetch('/api/v1/dashboard/failures');
    const data = await resp.json();

    if (data.length === 0) {
        document.getElementById('failure-summary').innerHTML = '<div style="color: #3fb950; font-size: 18px; padding: 20px;">No failures recorded!</div>';
        return;
    }

    const total = data.reduce((sum, f) => sum + f.count, 0);
    const labels = data.map(f => f.type);
    const counts = data.map(f => f.count);
    const colors = ['#f85149', '#d29922', '#6366f1', '#3fb950', '#58a6ff', '#f778ba', '#8b949e', '#30363d', '#21262d', '#0f1117'];

    new Chart(document.getElementById('failureChart'), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{ data: counts, backgroundColor: colors.slice(0, data.length) }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom', labels: { color: '#8b949e' } }
            }
        }
    });

    const summary = document.getElementById('failure-summary');
    summary.innerHTML = `<div style="font-size: 36px; font-weight: 700; color: #f85149;">${total}</div>
        <div style="color: #8b949e; margin-top: 4px;">Total failures across ${data.length} categories</div>`;

    const tbody = document.getElementById('failure-table');
    tbody.innerHTML = data.map(f => {
        const pct = (f.count / total * 100).toFixed(1);
        return `<tr>
            <td>${f.type}</td>
            <td>${f.count}</td>
            <td><span class="badge ${pct > 50 ? 'fail' : 'error'}">${pct}%</span></td>
        </tr>`;
    }).join('');
}
loadFailures();
</script>
{% endblock %}
